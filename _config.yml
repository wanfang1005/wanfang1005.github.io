# ===============================
# 基本信息
# ===============================
title: "Wanfang's Learning Log"
description: "关于我试图用博客治好健忘症这档事"
url: "https://wanfang1005.github.io"
baseurl: ""

# ===============================
# 主题
# ===============================
remote_theme: mmistakes/minimal-mistakes@4.24.0

# ===============================
# 插件
# ===============================
plugins:
  - jekyll-include-cache
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-gist
  - jemoji

# ===============================
# 主题外观
# ===============================
minimal_mistakes_skin: "mint"

# ===============================
# 搜索
# ===============================
search: true

# ===============================
# 分页
# ===============================
paginate: 10
paginate_path: "/page:num/"

# ===============================
# 默认文章配置
# ===============================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      show_date: true
      read_time: true
      sidebar:
        nav: "blog"

# ===============================
# Markdown 渲染
# ===============================
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

# ===============================
# SEO
# ===============================
author:
  name: "Wanfang"

# ===============================
# 排除文件
# ===============================
exclude:
  - README.md
  - node_modules
  - vendor
